<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
<title>❤️U Festival App</title>
<meta name="theme-color" content="#F03228">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="❤️U Festival">
<link rel="apple-touch-icon" href="/assets/logoBlack.webp">
<link href="https://fonts.googleapis.com/css2?family=Sansation:ital,wght@0,300;0,400;0,700;1,300&display=swap" rel="stylesheet">
<link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  html, body { height: 100%; }
  body { background: radial-gradient(125% 85% at 50% 0%, #1d1d1f 0%, #0c0c0d 58%, #060607 100%); display: flex; justify-content: center; align-items: center; min-height: 100vh; font-family: 'Sansation', sans-serif; -webkit-font-smoothing: antialiased; padding: 24px; }
  #root { display: flex; justify-content: center; align-items: center; width: 100%; min-height: 100vh; }
  /* On phones: fill the whole screen, no frame padding */
  @media (max-width: 600px) {
    body { padding: 0; background: #000; min-height: 100dvh; }
    #root { min-height: 100dvh; }
  }
  ::-webkit-scrollbar { width: 0; height: 0; }
  @keyframes pulse-dot { 0%,100%{transform:scale(1);opacity:1} 50%{transform:scale(1.3);opacity:0.5} }
  @keyframes fade-in { from{opacity:0;transform:translateY(6px)} to{opacity:1;transform:translateY(0)} }
  @keyframes slide-up { from{transform:translateY(100%)} to{transform:translateY(0)} }
  @keyframes spin { to{transform:rotate(360deg)} }
  @keyframes now-pulse { 0%,100%{box-shadow:0 0 0 2px #F03228, 0 0 12px rgba(240,50,40,0.5)} 50%{box-shadow:0 0 0 2px #F03228, 0 0 20px rgba(240,50,40,0.9)} }
  @keyframes hero-glow { 0%,100%{opacity:0.5;transform:scale(0.9)} 50%{opacity:0.95;transform:scale(1.12)} }
  @keyframes float-y { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-12px)} }
  @keyframes tick { from{transform:translateY(-4px);opacity:0.25} to{transform:translateY(0);opacity:1} }
  @keyframes sheen { 0%{transform:translateX(-180%)} 55%,100%{transform:translateX(520%)} }
  .screen-enter { animation: fade-in 0.25s ease both; }
  .sheet-enter { animation: slide-up 0.3s cubic-bezier(0.32,0.72,0,1) both; }
</style>
</head>
<body>
<div id="root"></div>
<script type="module" src="/src/main.jsx"></script>

<script>
// ── Install Prompt (Add to Home Screen) ──────────────────────────────────────
let _deferredPrompt = null;

window.addEventListener('beforeinstallprompt', (e) => {
  e.preventDefault();
  _deferredPrompt = e;
  showInstallBanner();
});

function showInstallBanner() {
  if (document.getElementById('pwa-banner')) return;

  const banner = document.createElement('div');
  banner.id = 'pwa-banner';
  banner.style.cssText = `
    position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%);
    z-index: 9999; background: #1A1A1A; border: 1px solid rgba(255,255,255,0.12);
    border-radius: 16px; padding: 14px 18px; display: flex; align-items: center;
    gap: 14px; box-shadow: 0 8px 32px rgba(0,0,0,0.6);
    font-family: 'Sansation', sans-serif; min-width: 300px; max-width: 360px;
    animation: slide-up .3s cubic-bezier(.32,.72,0,1) both;
  `;
  banner.innerHTML = `
    <img src="assets/logoBlack.webp" style="width:40px;height:40px;border-radius:10px;flex-shrink:0;object-fit:cover;">
    <div style="flex:1;min-width:0;">
      <div style="color:#fff;font-weight:700;font-size:13px;">Add to Home Screen</div>
      <div style="color:rgba(255,255,255,0.55);font-size:11px;margin-top:2px;">Get the full ❤️U Festival experience</div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;flex-shrink:0;">
      <button id="pwa-install" style="background:#F03228;color:#fff;border:none;border-radius:8px;padding:7px 14px;cursor:pointer;font-family:'Sansation',sans-serif;font-weight:700;font-size:12px;">Install</button>
      <button id="pwa-dismiss" style="background:transparent;color:rgba(255,255,255,0.4);border:none;cursor:pointer;font-family:'Sansation',sans-serif;font-size:11px;">Not now</button>
    </div>
  `;

  document.body.appendChild(banner);

  document.getElementById('pwa-install').addEventListener('click', async () => {
    banner.remove();
    if (!_deferredPrompt) return;
    _deferredPrompt.prompt();
    await _deferredPrompt.userChoice;
    _deferredPrompt = null;
  });

  document.getElementById('pwa-dismiss').addEventListener('click', () => {
    banner.remove();
  });
}
</script>
</body>
</html>
